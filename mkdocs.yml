site_name: Silkroad Online Client Documentation
site_description: Reverse-engineered documentation of the Silkroad Online game client (Silkroad_TestIn)
site_url: ""
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md

  - Client Architecture:
      - Overview: overview.md
      - Client Binary: sro_client.md
      - Class Hierarchy: class_hierarchy.md
      - Anti-Cheat: anticheat.md
      - Startup & Configuration: client_startup.md

  - File Formats & Assets:
      - PK2 Archive: pk2_format.md
      - Asset Formats: asset_formats.md
      - Character Rendering: character_rendering.md
      - Terrain Rendering: terrain_rendering.md

  - Data Tables: data_tables.md

  - Game Systems:
